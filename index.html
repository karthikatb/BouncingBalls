<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Bouncing Balls</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="countBox">
    Balls: <span id="count">0</span>
  </div>

  <div id="info">
    Left Click → Add Ball<br>
    Right Click → Remove Ball<br>
    Press SPACE → Add 5 Balls<br>
    Press BACKSPACE → Remove 5 Balls
  </div>

  <canvas></canvas>

  <script src="script.js"></script>
</body>
